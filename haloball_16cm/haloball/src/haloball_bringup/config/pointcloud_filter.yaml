/pointcloud_filter:
  ros__parameters:
    pointcloud_topic: "/cloud_registered"
    filtered_pointcloud_topic: "/cloud_registered_filtered"
    laser_scan_topic: "/scan"
    publish_filtered_pointcloud: true
    min_height: 0.0 # meters
    max_height: 1.0 # meters
    filter_rings: false # Removes unwanted LiDAR rings caused by secondary pulse returns
    publish_laserscan: false
    scan_angle_min: -3.141592653589793  # radians
    scan_angle_max: 3.141592653589793 # radians
    scan_angle_increment: 0.006143  # radians
    scan_range_min: 0.3 # meters
    scan_range_max: 10.0 # meters